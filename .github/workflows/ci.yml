name: CI

# Valida lint + typecheck/compilación + tests en cada PR y en push a main.
# Independiente de deploy.yml (que solo deploya). Idealmente, a futuro, el deploy
# podría gatear contra este workflow (ver workflow_run / needs).
on:
  pull_request:
    branches: [main]
    # Cambios que son SOLO documentación no gatean lint/build/tests: no cambian
    # el código ni el esquema, así que el CI no aporta nada. Si un commit toca
    # docs + código, el CI igual corre (basta un path no-ignorado para dispararlo).
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

# Cancela corridas viejas del mismo ref si se pushea de nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint · build · test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Lint NO bloqueante por ahora: el código tiene ~109 errores pre-existentes
      # (mayormente no-explicit-any en apiClient/fetchProfile/tests) que nunca se
      # gatearon. Corre y deja el resultado en los logs, pero no falla el CI.
      # Cuando se limpie la deuda, sacar `continue-on-error` para hacerlo bloqueante.
      - name: Lint (informativo)
        run: pnpm turbo run lint
        continue-on-error: true

      # build = typecheck real: tsc -b (app) + astro build (landing). No necesita
      # los secrets de runtime; el plugin de Sentry solo sube source maps si está
      # SENTRY_AUTH_TOKEN, así que en CI simplemente no los sube.
      - name: Build (typecheck + compile)
        run: pnpm turbo run build

      - name: Unit tests (vitest)
        run: pnpm --filter aliados-app test

  backend:
    name: Backend (test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      # Suite unitaria (compila main + test y corre los tests sin @Tag("integration")).
      # No necesita DB ni secrets: son tests de servicio con Mockito.
      - name: Unit tests
        working-directory: backend
        run: ./gradlew test --no-daemon

      # Tests de integración con Testcontainers (Postgres real efímero): verifican que
      # las migraciones Flyway apliquen y que las entidades JPA validen contra el esquema.
      # Los runners ubuntu-latest de GitHub traen Docker, así que Testcontainers corre solo.
      - name: Integration tests (Testcontainers)
        working-directory: backend
        run: ./gradlew integrationTest --no-daemon
