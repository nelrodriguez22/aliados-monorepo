name: Deploy to Firebase Hosting
on:
  workflow_dispatch: {} # permite disparar el deploy a mano desde la pestaña Actions
  push:
    branches: [main]
    paths:
      - 'apps/app/**'
      - 'apps/landing/**'
      - 'packages/**'
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build all
        run: pnpm turbo build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_LANDING_URL: ${{ secrets.VITE_LANDING_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          # Sentry frontend. El DSN es público (no es secreto) → va hardcodeado.
          VITE_SENTRY_DSN: https://4b48303d9b363e8678cca66cd6e4b2f1@o4505853206003712.ingest.us.sentry.io/4511298063761408
          VITE_SENTRY_TRACES_SAMPLE_RATE: "0.2"
          VITE_APP_VERSION: ${{ github.sha }}
          # Source maps a Sentry (opcional). El plugin solo sube si SENTRY_AUTH_TOKEN existe;
          # si faltan estos secrets, el build NO falla, solo no sube los maps.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: convivir
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --project aliados-web-22 --token "${{ secrets.FIREBASE_TOKEN }}"