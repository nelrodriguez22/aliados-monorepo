    spring.application.name=aliados-web-backend
    server.port=${PORT:8080}

    # Database Configuration
    spring.datasource.url=${DATABASE_URL}
    spring.datasource.driver-class-name=org.postgresql.Driver
    spring.jpa.hibernate.ddl-auto=update
    spring.jpa.show-sql=false
    spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
    spring.jpa.properties.hibernate.format_sql=true

    # Actuator
    management.endpoints.web.exposure.include=health,info
    management.endpoint.health.show-details=when-authorized

    # Logging
    logging.level.com.aliados=INFO
    logging.level.org.hibernate.SQL=DEBUG

    #maps
    google.maps.api.key=${GOOGLE_MAPS_API_KEY}

    # SendGrid
    sendgrid.api-key=${SENDGRID_API_KEY}
    sendgrid.from-email=${SENDGRID_FROM_EMAIL:noreply@aliados.com}
    sendgrid.from-name=Aliados

    # App
    app.frontend-url=${FRONTEND_URL:https://aliados-app-22.web.app}

    #timezone
    spring.jackson.time-zone=UTC
    spring.jackson.serialization.write-dates-as-timestamps=false