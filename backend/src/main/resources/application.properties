    spring.application.name=aliados-web-backend
    server.port=${PORT:8080}

    # Database Configuration
    spring.datasource.url=${DATABASE_URL}
    spring.datasource.driver-class-name=org.postgresql.Driver
    # Pool de conexiones (HikariCP). El default era 10 → cuello bajo concurrencia.
    # 20 es un valor conservador y seguro. ⚠️ Si la DB es Neon, el DATABASE_URL debe
    # apuntar al endpoint *pooled* (pgBouncer) antes de subir esto, para no agotar el
    # max_connections de Postgres. max-lifetime 5min recicla conexiones que el pooler
    # serverless puede cerrar por inactividad.
    spring.datasource.hikari.maximum-pool-size=20
    spring.datasource.hikari.minimum-idle=5
    spring.datasource.hikari.connection-timeout=10000
    spring.datasource.hikari.max-lifetime=300000
    # Flyway es la unica fuente de verdad del esquema. Hibernate solo valida
    # que las entidades coincidan con lo que crearon las migraciones.
    spring.jpa.hibernate.ddl-auto=validate
    spring.jpa.show-sql=false
    spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
    spring.jpa.properties.hibernate.format_sql=true
    # Sesión cerrada al salir del @Transactional. Hace que cualquier acceso LAZY mal
    # resuelto explote como LazyInitializationException (no como N+1 silencioso).
    spring.jpa.open-in-view=false

    # Flyway
    spring.flyway.enabled=true
    spring.flyway.locations=classpath:db/migration
    spring.flyway.baseline-on-migrate=true

    # Actuator
    management.endpoints.web.exposure.include=health,info
    management.endpoint.health.show-details=when-authorized

    # Logging
    logging.level.com.aliados=INFO
    # SQL en WARN para prod (DEBUG logueaba cada query: ruido + overhead + posible fuga de datos).
    # Subir a DEBUG puntualmente y local para depurar.
    logging.level.org.hibernate.SQL=WARN

    #maps
    google.maps.api.key=${GOOGLE_MAPS_API_KEY}

    # Resend (email transaccional)
    resend.api-key=${RESEND_API_KEY}
    resend.from-email=${RESEND_FROM_EMAIL:onboarding@resend.dev}
    resend.from-name=Aliados

    # Cloudinary
    cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
    cloudinary.api-key=${CLOUDINARY_API_KEY}
    cloudinary.api-secret=${CLOUDINARY_API_SECRET}

    # Sentry (error monitoring + tracing). DSN vacío ⇒ SDK apagado (dev). El DSN es público.
    sentry.dsn=${SENTRY_DSN:}
    sentry.environment=${SENTRY_ENVIRONMENT:production}
    # Release para agrupar errores por deploy. Railway expone RAILWAY_GIT_COMMIT_SHA;
    # se evita el string vacío (Sentry lo descarta con "expected a non-empty string").
    sentry.release=${SENTRY_RELEASE:${RAILWAY_GIT_COMMIT_SHA:}}
    sentry.traces-sample-rate=${SENTRY_TRACES_SAMPLE_RATE:0.2}
    # Privacidad: no mandar PII/headers por defecto.
    sentry.send-default-pii=false

    # App
    app.frontend-url=${FRONTEND_URL:https://aliados-app-22.web.app}

    #timezone
spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false

# Mudanza - Ratio de tiempo. Multiplica el tiempo REAL transcurrido para calcular los
# minutos de servicio facturados (bloques extra). Controlado por env var en cada entorno.
# Default = 1.0 (tiempo real) → SEGURO para prod aunque la env var no esté seteada.
# Testing: setear MUDANZA_RATIO_TIEMPO=180 (1 min real = 3 horas de servicio) para no
# esperar horas reales al probar el cobro de bloques extra.
mudanza.ratio-tiempo=${MUDANZA_RATIO_TIEMPO:1.0}

# Comisión de la plataforma para mudanzas (%). Global; se persiste por mudanza al crearla.
app.mudanza.comision-porcentaje=${MUDANZA_COMISION_PORCENTAJE:10.00}

# Graceful shutdown: termina requests en vuelo antes de cerrar (deploys sin cortar)
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s